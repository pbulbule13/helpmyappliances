name: Backend & Web — Build & Deploy to GCP

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "web/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  PROJECT_ID: helpmyappliances
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/helpmyappliances/helpmyappliances

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push backend image
        run: |
          docker build -t ${{ env.REGISTRY }}/backend:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/backend:latest \
                       ./backend
          docker push ${{ env.REGISTRY }}/backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/backend:latest

      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: helpmyappliances-backend
          image: ${{ env.REGISTRY }}/backend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --port=8000
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --add-cloudsql-instances=helpmyappliances:us-central1:helpmyappliances-pg
            --set-secrets=DATABASE_URL=helpmyappliances-db-url:latest,REDIS_URL=helpmyappliances-redis-url:latest,EURI_API_KEY=helpmyappliances-euri-key:latest
            --set-env-vars=APP_ENV=production,GOOGLE_CLOUD_PROJECT=helpmyappliances,GCS_BUCKET_NAME=helpmyappliances-uploads

  deploy-web:
    name: Deploy Web to Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe helpmyappliances-backend \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push web image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }} \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }} \
            -t ${{ env.REGISTRY }}/web:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/web:latest \
            ./web
          docker push ${{ env.REGISTRY }}/web:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/web:latest

      - name: Deploy web to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: helpmyappliances-web
          image: ${{ env.REGISTRY }}/web:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: >-
            --allow-unauthenticated
            --port=3000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
