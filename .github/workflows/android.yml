name: Android — Build & Distribute

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Write local.properties (required by Flutter Gradle plugin)
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > frontend/android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> frontend/android/local.properties

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode \
            > frontend/android/app/google-services.json

      - name: Get Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Build release APK
        working-directory: frontend
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: frontend/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Decode Firebase service account
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" | base64 --decode > $RUNNER_TEMP/firebase-key.json

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFile: ${{ runner.temp }}/firebase-key.json
          groups: testers
          file: frontend/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          releaseNotes: |
            Build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            ${{ github.event.head_commit.message }}
